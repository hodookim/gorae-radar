name: Daily wallet snapshot

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-wallet-snapshot
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Capture public Hyperliquid snapshot
        id: capture
        shell: bash
        run: |
          snapshot_path="$(npm run --silent capture:snapshot)"
          snapshot_rel="${snapshot_path#"$GITHUB_WORKSPACE/"}"
          echo "path=$snapshot_path" >> "$GITHUB_OUTPUT"
          echo "rel=$snapshot_rel" >> "$GITHUB_OUTPUT"

      - name: Validate snapshot
        env:
          SNAPSHOT_PATH: ${{ steps.capture.outputs.path }}
        run: |
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const data = JSON.parse(readFileSync(process.env.SNAPSHOT_PATH, 'utf8'));
            if (data.observation?.stale) throw new Error('stale snapshot');
            if (!(data.summary?.wallet_count > 0)) throw new Error('no wallets');
            if (!(data.summary?.position_count > 0)) throw new Error('no positions');
          "

      - name: Verify generated reports
        run: |
          npm run test:js
          npm run audit:adsense

      - name: Commit snapshot
        env:
          SNAPSHOT_REL: ${{ steps.capture.outputs.rel }}
        shell: bash
        run: |
          git add -- "$SNAPSHOT_REL"
          if git diff --cached --quiet; then
            echo "No new snapshot to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: add scheduled wallet snapshot"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
